<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes — Rai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<!-- Marked.js for markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #3a3a3a;
    --paper: #f8f5f0;
    --paper-dark: #eee9e0;
    --accent: #c45d3e;
    --accent-hover: #a94d32;
    --accent-faint: rgba(196,93,62,0.06);
    --green: #3a7d5c;
    --blue: #3d6b99;
    --muted: #8a8078;
    --rule: #d4cdc4;
    --white: #ffffff;
    --tag-bg: #e6dfd6;
    --note-bg: #fefcf9;
    --note-border: #e8dfd4;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 6px;
    --max-w: 720px;
    --sidebar-w: 340px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ══════════════ PROGRESS BAR ══════════════ */
  .progress-bar {
    position: fixed; top: 0; left: 0;
    height: 2px; background: var(--accent);
    z-index: 200; width: 0%;
    transition: width 0.1s linear;
  }

  /* ══════════════ HEADER ══════════════ */
  .site-header {
    border-bottom: 1px solid var(--rule);
    padding: 1.4rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1140px; margin: 0 auto;
    position: sticky; top: 0; background: var(--paper);
    z-index: 100;
  }
  .site-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem; font-weight: 400; letter-spacing: -0.02em;
    cursor: pointer;
  }
  .site-header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 0.8rem; align-items: center; }

  .search-box {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--white); border: 1px solid var(--rule);
    border-radius: 20px; padding: 0.4rem 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-faint);
  }
  .search-box svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }
  .search-box input {
    border: none; outline: none; background: none;
    font-family: inherit; font-size: 0.82rem;
    color: var(--ink); width: 160px;
  }
  .search-box input::placeholder { color: var(--muted); }

  .filter-btn {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); background: none; border: 1px solid var(--rule);
    padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ══════════════ INDEX ══════════════ */
  .index-view {
    max-width: 1140px; margin: 0 auto; padding: 2.5rem 2rem;
  }
  .index-intro {
    max-width: 580px; margin-bottom: 1.5rem;
  }
  .index-intro p {
    color: var(--muted); font-size: 0.92rem; line-height: 1.6;
  }

  .source-filters {
    display: flex; gap: 0.5rem; margin-bottom: 2rem;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 1.4rem;
  }
  .article-card {
    background: var(--white); border: 1px solid var(--rule);
    border-radius: var(--radius); padding: 1.6rem 1.8rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .article-card:hover {
    transform: translateY(-2px); box-shadow: var(--shadow-md);
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem;
  }
  .card-meta {
    font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
  }
  .source-badge {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.2rem 0.55rem; border-radius: 3px; font-weight: 500;
  }
  .source-badge.claude { background: #f0e6dc; color: var(--accent); }
  .source-badge.chatgpt { background: #dce8dc; color: var(--green); }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.3rem; line-height: 1.25;
    margin-bottom: 0.5rem; font-weight: 400;
  }
  .card-excerpt {
    color: var(--muted); font-size: 0.83rem; line-height: 1.5; flex: 1;
  }
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1rem;
  }
  .card-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .tag {
    font-size: 0.68rem; background: var(--tag-bg); color: var(--muted);
    padding: 0.18rem 0.5rem; border-radius: 3px;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .note-count {
    font-size: 0.72rem; color: var(--muted);
    display: flex; align-items: center; gap: 0.3rem;
  }
  .note-count svg { width: 13px; height: 13px; }

  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--muted);
  }
  .empty-state p { font-size: 0.9rem; }

  /* ══════════════ ARTICLE VIEW ══════════════ */
  .article-view { display: none; }
  .article-view.active { display: block; }
  .index-view.hidden { display: none; }

  .article-hero {
    max-width: 1140px; margin: 0 auto;
    padding: 2.5rem 2rem 1.5rem;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); text-decoration: none; cursor: pointer;
    margin-bottom: 1.8rem; transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }
  .back-link svg { width: 14px; height: 14px; }

  .hero-meta {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 0.8rem;
  }
  .hero-meta .meta-text {
    font-size: 0.76rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--accent);
  }
  .article-hero h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 400; line-height: 1.15;
    letter-spacing: -0.02em; max-width: 700px;
  }
  .article-hero .subtitle {
    color: var(--muted); font-size: 1rem;
    margin-top: 0.8rem; max-width: 600px; line-height: 1.5;
  }

  .article-layout {
    max-width: 1140px; margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: var(--max-w) 1fr;
    gap: 3rem;
  }

  /* ══════════════ PROSE ══════════════ */
  .prose h1 { display: none; } /* hide the md title since we show it in hero */
  .prose h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.55rem; font-weight: 400;
    margin: 2.5rem 0 0.7rem;
    letter-spacing: -0.01em;
    padding-left: 1rem; position: relative;
  }
  .prose h2::before {
    content: ''; position: absolute; left: 0;
    top: 0.2em; bottom: 0.2em;
    width: 3px; background: var(--accent); border-radius: 2px;
  }
  .prose h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin: 2rem 0 0.5rem; color: var(--muted);
  }
  .prose p { margin-bottom: 1rem; font-size: 0.97rem; }
  .prose ul, .prose ol { margin: 0.6rem 0 1.1rem 1.4rem; }
  .prose li { margin-bottom: 0.35rem; font-size: 0.93rem; }
  .prose strong { font-weight: 500; }
  .prose code {
    font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
    background: var(--paper-dark); padding: 0.12em 0.4em; border-radius: 3px;
  }
  .prose pre {
    background: var(--ink); color: #e0ddd8;
    padding: 1.2rem 1.4rem; border-radius: var(--radius);
    overflow-x: auto; margin: 1.2rem 0;
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    line-height: 1.6;
  }
  .prose pre code { background: none; padding: 0; color: inherit; }
  .prose blockquote {
    border-left: 3px solid var(--accent-faint);
    border-left-color: var(--accent);
    padding: 0.7rem 1.2rem; margin: 1.4rem 0;
    background: var(--accent-faint);
    border-radius: 0 4px 4px 0;
    font-style: italic; color: var(--ink-soft);
  }
  .prose blockquote p { margin-bottom: 0; }
  .prose table {
    width: 100%; border-collapse: collapse;
    margin: 1.4rem 0; font-size: 0.86rem;
  }
  .prose th {
    text-align: left; font-weight: 500;
    text-transform: uppercase; font-size: 0.7rem;
    letter-spacing: 0.06em; color: var(--muted);
    border-bottom: 2px solid var(--rule); padding: 0.5rem 0.7rem;
  }
  .prose td {
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--rule); vertical-align: top;
  }
  .prose img {
    max-width: 100%; border-radius: var(--radius);
    margin: 1rem 0;
  }
  .prose hr {
    border: none; border-top: 1px solid var(--rule);
    margin: 2rem 0;
  }

  /* ══════════════ SIDEBAR ══════════════ */
  .sidebar {
    position: sticky; top: 5rem; align-self: start;
  }
  .sidebar-section { margin-bottom: 1.8rem; }
  .sidebar-section h4 {
    font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted);
    margin-bottom: 0.7rem;
  }
  .toc-list { list-style: none; }
  .toc-list li { margin-bottom: 0.4rem; }
  .toc-list a {
    font-size: 0.8rem; color: var(--muted);
    text-decoration: none; transition: color 0.2s;
    line-height: 1.35; display: block;
  }
  .toc-list a:hover { color: var(--accent); }
  .reading-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--muted);
    line-height: 1.8;
  }

  /* ══════════════ NOTES PANEL ══════════════ */
  .notes-toggle {
    display: flex; align-items: center; gap: 0.4rem;
    background: var(--accent); color: var(--paper);
    border: none; padding: 0.5rem 1rem;
    border-radius: 20px; font-family: inherit;
    font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
    letter-spacing: 0.02em;
  }
  .notes-toggle:hover { background: var(--accent-hover); }
  .notes-toggle svg { width: 14px; height: 14px; }

  .notes-panel {
    background: var(--note-bg);
    border: 1px solid var(--note-border);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-top: 0.8rem;
    display: none;
  }
  .notes-panel.open { display: block; }

  .notes-panel textarea {
    width: 100%; min-height: 140px;
    background: var(--white); border: 1px solid var(--rule);
    border-radius: 4px; padding: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; line-height: 1.6;
    color: var(--ink); resize: vertical;
    outline: none; transition: border-color 0.2s;
  }
  .notes-panel textarea:focus {
    border-color: var(--accent);
  }
  .notes-panel textarea::placeholder { color: var(--muted); }

  .notes-actions {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 0.6rem;
  }
  .save-indicator {
    font-size: 0.72rem; color: var(--green);
    opacity: 0; transition: opacity 0.3s;
  }
  .save-indicator.show { opacity: 1; }

  .saved-notes { margin-top: 1rem; }
  .saved-note {
    background: var(--white); border: 1px solid var(--rule);
    border-radius: 4px; padding: 0.7rem 0.9rem;
    margin-bottom: 0.5rem; position: relative;
  }
  .saved-note p {
    font-size: 0.83rem; line-height: 1.5;
    white-space: pre-wrap; color: var(--ink-soft);
  }
  .saved-note .note-time {
    font-size: 0.68rem; color: var(--muted);
    margin-top: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .saved-note .delete-note {
    position: absolute; top: 0.5rem; right: 0.5rem;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.9rem; line-height: 1;
    padding: 0.2rem; opacity: 0; transition: opacity 0.2s;
  }
  .saved-note:hover .delete-note { opacity: 1; }
  .saved-note .delete-note:hover { color: var(--accent); }

  .note-add-btn {
    background: var(--ink); color: var(--paper);
    border: none; padding: 0.4rem 0.9rem;
    border-radius: 4px; font-family: inherit;
    font-size: 0.78rem; cursor: pointer;
    transition: background 0.2s;
  }
  .note-add-btn:hover { background: var(--ink-soft); }

  /* ══════════════ FOOTER ══════════════ */
  .site-footer {
    border-top: 1px solid var(--rule);
    padding: 2rem; text-align: center;
    font-size: 0.76rem; color: var(--muted);
    max-width: 1140px; margin: 0 auto;
  }

  /* ══════════════ ANIMATIONS ══════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeUp 0.4s ease forwards; opacity: 0;
  }

  /* ══════════════ RESPONSIVE ══════════════ */
  @media (max-width: 860px) {
    .article-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .site-header, .index-view, .article-hero, .article-layout {
      padding-left: 1.2rem; padding-right: 1.2rem;
    }
    .search-box input { width: 120px; }
    .article-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- ═══════ HEADER ═══════ -->
<header class="site-header">
  <h1 onclick="showIndex()"><span>Field</span> Notes</h1>
  <div class="header-actions">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search articles..." id="searchInput" oninput="filterArticles()">
    </div>
  </div>
</header>

<!-- ═══════ INDEX ═══════ -->
<main class="index-view" id="indexView">
  <div class="index-intro fade-in">
    <p>Deep research articles, frameworks, and thinking from Claude and ChatGPT — saved, annotated, and revisited.</p>
  </div>
  <div class="source-filters" id="sourceFilters">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('claude')">Claude</button>
    <button class="filter-btn" onclick="setFilter('chatgpt')">ChatGPT</button>
  </div>
  <div class="article-grid" id="articleGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <p>No articles match your search.</p>
  </div>
</main>

<!-- ═══════ ARTICLE VIEW ═══════ -->
<section class="article-view" id="articleView">
  <div class="article-hero">
    <a class="back-link" onclick="showIndex()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Archive
    </a>
    <div class="hero-meta">
      <span class="source-badge" id="heroBadge"></span>
      <span class="meta-text" id="heroMeta"></span>
    </div>
    <h2 id="heroTitle"></h2>
    <p class="subtitle" id="heroSubtitle"></p>
  </div>
  <div class="article-layout">
    <div>
      <article class="prose" id="articleBody"></article>
    </div>
    <aside class="sidebar" id="articleSidebar">
      <div class="sidebar-section">
        <div class="reading-meta" id="readingMeta"></div>
      </div>
      <div class="sidebar-section" id="tocSection"></div>
      <div class="sidebar-section">
        <button class="notes-toggle" onclick="toggleNotes()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span id="notesToggleLabel">Notes</span>
        </button>
        <div class="notes-panel" id="notesPanel">
          <textarea id="noteInput" placeholder="Write your notes on this article..."></textarea>
          <div class="notes-actions">
            <span class="save-indicator" id="saveIndicator">Saved</span>
            <button class="note-add-btn" onclick="addNote()">Add Note</button>
          </div>
          <div class="saved-notes" id="savedNotes"></div>
        </div>
      </div>
      <div class="sidebar-section">
        <h4>Tags</h4>
        <div class="card-tags" id="sidebarTags"></div>
      </div>
    </aside>
  </div>
</section>

<footer class="site-footer">
  Field Notes · A reading journal by Rai
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let articles = [];
let currentFilter = 'all';
let currentArticleId = null;

// ═══════════════════════════════════════════════════════
//  LOAD MANIFEST + ARTICLES
// ═══════════════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch('posts/index.json');
    articles = await res.json();
    renderIndex();

    // Check if URL hash points to an article
    if (window.location.hash) {
      const id = window.location.hash.slice(1);
      const article = articles.find(a => a.id === id);
      if (article) showArticle(id);
    }
  } catch (e) {
    console.error('Failed to load manifest:', e);
    document.getElementById('articleGrid').innerHTML =
      '<div class="empty-state"><p>Could not load articles. Make sure posts/index.json exists.</p></div>';
  }
}

// ═══════════════════════════════════════════════════════
//  INDEX RENDERING
// ═══════════════════════════════════════════════════════
function renderIndex() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = articles.filter(a => {
    const matchSource = currentFilter === 'all' || a.source === currentFilter;
    const matchSearch = !search ||
      a.title.toLowerCase().includes(search) ||
      a.category.toLowerCase().includes(search) ||
      a.tags.some(t => t.toLowerCase().includes(search)) ||
      (a.subtitle && a.subtitle.toLowerCase().includes(search));
    return matchSource && matchSearch;
  });

  const grid = document.getElementById('articleGrid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((a, i) => {
    const noteCount = getNotes(a.id).length;
    const dateStr = formatDate(a.date);
    return `
    <div class="article-card fade-in" onclick="showArticle('${a.id}')" style="animation-delay:${i*0.05}s">
      <div class="card-header">
        <span class="card-meta">${a.category} · ${dateStr}</span>
        <span class="source-badge ${a.source}">${a.source}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-excerpt">${a.subtitle || ''}</div>
      <div class="card-footer">
        <div class="card-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        ${noteCount ? `<span class="note-count"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>${noteCount}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterArticles() { renderIndex(); }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderIndex();
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ═══════════════════════════════════════════════════════
//  ARTICLE VIEW
// ═══════════════════════════════════════════════════════
async function showArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentArticleId = id;
  window.location.hash = id;

  // Load the markdown file
  try {
    const res = await fetch(`posts/${a.file}`);
    const md = await res.text();
    const html = marked.parse(md);

    document.getElementById('indexView').classList.add('hidden');
    document.getElementById('articleView').classList.add('active');

    // Hero
    const badge = document.getElementById('heroBadge');
    badge.textContent = a.source;
    badge.className = `source-badge ${a.source}`;
    document.getElementById('heroMeta').textContent = `${a.category} · ${formatDate(a.date)}`;
    document.getElementById('heroTitle').textContent = a.title;
    document.getElementById('heroSubtitle').textContent = a.subtitle || '';

    // Body
    document.getElementById('articleBody').innerHTML = html;

    // TOC — auto-generate from h2s
    const h2s = document.querySelectorAll('.prose h2');
    const tocSection = document.getElementById('tocSection');
    if (h2s.length > 1) {
      let tocHTML = '<h4>Contents</h4><ul class="toc-list">';
      h2s.forEach((h, i) => {
        h.id = 'section-' + i;
        tocHTML += `<li><a href="#section-${i}">${h.textContent}</a></li>`;
      });
      tocHTML += '</ul>';
      tocSection.innerHTML = tocHTML;
    } else {
      tocSection.innerHTML = '';
    }

    // Sidebar meta
    const wordCount = md.replace(/[#*_\[\]|`>-]/g, '').split(/\s+/).length;
    const mins = Math.ceil(wordCount / 220);
    document.getElementById('readingMeta').innerHTML =
      `${mins} min read<br>${wordCount} words<br>Source: ${a.source}`;

    // Tags
    document.getElementById('sidebarTags').innerHTML =
      a.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // Notes
    renderNotes();
    document.getElementById('notesPanel').classList.remove('open');
    updateNotesLabel();

    window.scrollTo(0, 0);
  } catch (e) {
    console.error('Failed to load article:', e);
    document.getElementById('articleBody').innerHTML =
      `<p>Could not load <code>posts/${a.file}</code>. Make sure the file exists.</p>`;
  }
}

function showIndex() {
  document.getElementById('indexView').classList.remove('hidden');
  document.getElementById('articleView').classList.remove('active');
  document.getElementById('progressBar').style.width = '0%';
  window.location.hash = '';
  currentArticleId = null;
  renderIndex(); // refresh note counts
  window.scrollTo(0, 0);
}

// Progress bar
window.addEventListener('scroll', () => {
  if (!document.getElementById('articleView').classList.contains('active')) return;
  const h = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById('progressBar').style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
});

// ═══════════════════════════════════════════════════════
//  NOTES SYSTEM (localStorage)
// ═══════════════════════════════════════════════════════
function getNotesKey(id) { return `fieldnotes:${id || currentArticleId}`; }

function getNotes(id) {
  try {
    return JSON.parse(localStorage.getItem(getNotesKey(id)) || '[]');
  } catch { return []; }
}

function saveNotes(notes) {
  localStorage.setItem(getNotesKey(), JSON.stringify(notes));
}

function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text) return;

  const notes = getNotes();
  notes.unshift({
    text,
    time: new Date().toISOString()
  });
  saveNotes(notes);
  input.value = '';
  renderNotes();
  showSaveIndicator();
  updateNotesLabel();
}

function deleteNote(index) {
  const notes = getNotes();
  notes.splice(index, 1);
  saveNotes(notes);
  renderNotes();
  updateNotesLabel();
}

function renderNotes() {
  const notes = getNotes();
  const container = document.getElementById('savedNotes');
  if (notes.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = notes.map((n, i) => {
    const dt = new Date(n.time);
    const timeStr = dt.toLocaleDateString('en-GB', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
    });
    return `
    <div class="saved-note">
      <button class="delete-note" onclick="deleteNote(${i})" title="Delete note">&times;</button>
      <p>${escapeHTML(n.text)}</p>
      <div class="note-time">${timeStr}</div>
    </div>`;
  }).join('');
}

function toggleNotes() {
  document.getElementById('notesPanel').classList.toggle('open');
}

function updateNotesLabel() {
  const count = getNotes().length;
  document.getElementById('notesToggleLabel').textContent =
    count ? `Notes (${count})` : 'Notes';
}

function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Handle Enter in note input
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.metaKey && document.activeElement.id === 'noteInput') {
    addNote();
  }
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
init();
</script>
